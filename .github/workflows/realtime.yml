name: Realtime Trading Bot

on:
  schedule:
    # 한국 시간(KST) 평일 오전 8:00, 8:30 실행 (UTC 기준 일~목 23:00, 23:30)
    - cron: '0,30 23 * * 0-4'
    # 한국 시간(KST) 평일 오전 9:00 ~ 오후 3:30 사이 30분마다 실행 (UTC 기준 월~금 00:00 ~ 06:30)
    - cron: '0,30 0-6 * * 1-5'
  workflow_dispatch: # Actions 탭에서 수동으로도 실행할 수 있도록 버튼 생성
  
jobs:
  monitor_stocks:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v3

    - name: Python 3.10 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance pandas beautifulsoup4 openai python-dotenv

    - name: 실시간 감시 봇 실행
      env:
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
        TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      run: python realtime_bot.py
