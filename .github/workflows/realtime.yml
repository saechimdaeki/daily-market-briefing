name: Realtime Trading Bot

on:
  schedule:
    - cron: '0 23 * * 0-4'
    - cron: '0 0-6 * * 1-5'
  workflow_dispatch: # Actions 탭에서 수동으로도 실행할 수 있도록 버튼 생성

jobs:
  monitor_stocks:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v3

    - name: Python 3.10 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance pandas beautifulsoup4 openai python-dotenv

    - name: 실시간 감시 봇 실행
      env:
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
        TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      run: python realtime_bot.py