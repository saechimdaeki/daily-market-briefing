name: Auto YouTube Shorts Pipeline

on:
  schedule:
    # 월~금 KST 오전 9시 (UTC 자정)
    - cron: '0 0 * * 1-5'
  
  # 원할 때마다 GitHub 페이지에서 수동 버튼으로 실행할 수 있게 해줍니다.
  workflow_dispatch:

jobs:
  generate_video:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 3.10 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 시스템 라이브러리 및 한글 폰트 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-nanum
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//g' /etc/ImageMagick-6/policy.xml

      - name: 파이썬 패키지 설치
        run: |
          python -m pip install --upgrade pip
          # requirements.txt가 있다면 설치
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # 필수 패키지 추가 확인
          pip install requests yfinance openai gtts moviepy

      - name: 파이프라인 스크립트 실행
        env:
          # Secrets에 등록한 변수들을 서버 환경변수로 끌어옵니다.
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DID_API_KEY: ${{ secrets.DID_API_KEY }}
        run: |
          # youtube 폴더 안에 있는 스크립트를 실행합니다.
          python youtube/auto_youtube.py

      - name: 완성된 MP4 영상 저장 및 다운로드 링크 제공
        uses: actions/upload-artifact@v4
        with:
          name: daily-market-video
          path: AI_Shorts_*.mp4
          retention-days: 3