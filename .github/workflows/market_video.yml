name: Daily Market Video Pipeline

on:
  schedule:
    # 월~금 KST 오전 9시 (UTC 자정)
    - cron: '0 0 * * 1-5'
  
  workflow_dispatch: # 수동 실행 버튼

jobs:
  generate_video:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 3.10 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 한글 폰트 및 시스템 라이브러리 설치
      - name: 필수 시스템 라이브러리 및 한글 폰트 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-nanum
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//g' /etc/ImageMagick-6/policy.xml

      - name: 파이썬 패키지 설치
        run: |
          python -m pip install --upgrade pip
          # [핵심] Pillow 버전을 낮춰서 MoviePy와의 ANTIALIAS 에러를 해결합니다.
          pip install "Pillow<10.0.0"
          pip install requests yfinance openai moviepy==1.0.3

      - name: 파이프라인 스크립트 실행
        env:
          # GitHub Secrets에 AI_API_KEY가 등록되어 있어야 합니다.
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          python youtube/auto_youtube.py

      - name: 완성된 MP4 영상 저장 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: daily-market-video
          path: Mushroom_Briefing_*.mp4
          retention-days: 5