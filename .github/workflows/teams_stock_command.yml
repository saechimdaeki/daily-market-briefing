name: Teams Stock Command

on:
  workflow_dispatch:
    inputs:
      stock_query:
        description: "종목명 또는 티커 (예: SK하이닉스, 000660.KS, NVDA)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  send-stock-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.10 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Teams 단일 종목 브리핑 전송
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python teams_stock_command.py --query "${{ inputs.stock_query }}"
